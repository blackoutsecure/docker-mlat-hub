name: mlat-hub
description: >-
  LinuxServer.io containerized MLAT hub aggregating readsb network-only feeds
  into one combined Beast output.

post-provisioning: >-
  ## Usage instructions

  Include this snippet in your docker-compose.yml file under 'services':

    ```
    mlathub:
      image: blackoutsecure/mlat-hub:latest
      restart: unless-stopped
      environment:
        - TZ=Etc/UTC
        - MLATHUB_INPUTS=mlat-adsbx,30105,beast_in;mlat-adsbfi,30105,beast_in
      ports:
        - '30104:30104'
        - '30105:30105'
      security_opt:
        - 'no-new-privileges:true'
    ```

  Repository: https://github.com/blackoutsecure/docker-mlat-hub

version: 3.16.11
type: sw.block
assets:
